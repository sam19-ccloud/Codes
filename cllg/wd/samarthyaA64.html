<!DOCTYPE html>
<html>
<head>
    <title>My Web Page</title>

    <style>
        body {
            font-family: Arial;
            background-color: lightgray;
            margin: 0;
        }

        .top {
            background-color: black;
            color: white;
            text-align: center;
            padding: 15px;
        }

        .menu {
            background-color: gray;
            text-align: center;
            padding: 10px;
        }

        .menu a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        .content {
            padding: 20px;
        }

        .box {
            background-color: white;
            padding: 15px;
            margin: 10px;
            border: 1px solid black;
        }

        table {
            width: 100%;
            border: 1px solid black;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        input {
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 8px;
        }

        .footer {
            background-color: black;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>

</head>

<body>

<div class="top">
    <h1>My Web Page</h1>
</div>

<div class="menu">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</div>

<div class="content">

    <div class="box">
        <h2>About Me</h2>
        <p>This webpage is created using basic HTML and CSS.</p>
        <img src="https://via.placeholder.com/200">
    </div>

    <div class="box">
        <h2>My Skills</h2>
        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>C++</li>
        </ul>
    </div>

    <div class="box">
        <h2>Marks Table</h2>
        <table>
            <tr>
                <th>Subject</th>
                <th>Marks</th>
            </tr>
            <tr>
                <td>Math</td>
                <td>90</td>
            </tr>
            <tr>
                <td>Physics</td>
                <td>85</td>
            </tr>
        </table>
    </div>

    <div class="box">
        <h2>Contact Form</h2>
        <form>
            <input type="text" placeholder="Enter Name"><br>
            <input type="email" placeholder="Enter Email"><br>
            <button>Submit</button>
        </form>
    </div>

</div>

<div class="footer">
    <p>© 2026 My Web Page</p>
</div>

</body>
</html>
