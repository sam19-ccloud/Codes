<!DOCTYPE html>
<html>
<head>
    <title>Student Profile Page</title>

    <style>
        body {
            font-family: Verdana;
            background-color: #e6f2ff;
            margin: 0;
        }

        .header {
            background-color: darkblue;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .navbar {
            background-color: #444;
            text-align: center;
            padding: 12px;
        }

        .navbar a {
            color: yellow;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .main {
            padding: 25px;
        }

        .section {
            background-color: white;
            padding: 20px;
            margin-bottom: 15px;
            border: 2px solid #333;
        }

        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
        }

        th {
            background-color: lightblue;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }

        input {
            padding: 6px;
            margin: 6px;
            width: 200px;
        }

        button {
            padding: 8px 15px;
            background-color: darkblue;
            color: white;
            border: none;
        }

        .bottom {
            background-color: darkblue;
            color: white;
            text-align: center;
            padding: 12px;
        }
    </style>

</head>

<body>

<div class="header">
    <h1>Student Profile</h1>
</div>

<div class="navbar">
    <a href="#">Profile</a>
    <a href="#">Skills</a>
    <a href="#">Contact</a>
</div>

<div class="main">

    <div class="section">
        <h2>About Student</h2>
        <p>This is a simple webpage created for HTML and CSS practical.</p>
        <img src="https://via.placeholder.com/180">
    </div>

    <div class="section">
        <h2>Technical Skills</h2>
        <ol>
            <li>HTML Basics</li>
            <li>CSS Styling</li>
            <li>Programming in C++</li>
        </ol>
    </div>

    <div class="section">
        <h2>Academic Record</h2>
        <table>
            <tr>
                <th>Subject</th>
                <th>Score</th>
            </tr>
            <tr>
                <td>Mathematics</td>
                <td>88</td>
            </tr>
            <tr>
                <td>Computer</td>
                <td>92</td>
            </tr>
        </table>
    </div>

    <div class="section">
        <h2>Feedback Form</h2>
        <form>
            <input type="text" placeholder="Your Name"><br>
            <input type="email" placeholder="Your Email"><br>
            <button type="submit">Send</button>
        </form>
    </div>

</div>

<div class="bottom">
    <p>© 2026 Student Page</p>
</div>

</body>
</html>
